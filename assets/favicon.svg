<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Solid black background for tab visibility -->
    <circle cx="50" cy="50" r="48" fill="#000" />
    
    <!-- Background Orbital Ring (Static & Lightened) -->
    <circle cx="50" cy="50" r="45" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.6" />
    <circle cx="50" cy="50" r="38" stroke="cyan" stroke-width="2" stroke-dasharray="10 5" opacity="0.8" />

    <!-- The 'N' Structure (Static & Lightened) -->
    <g>
        <path d="M35 30V70" stroke="white" stroke-width="5" stroke-linecap="round" />
        <path d="M35 30L65 70" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" />
        <path d="M65 30V70" stroke="white" stroke-width="5" stroke-linecap="round" />
    </g>

    <!-- Encryption Nodes (Bright) -->
    <circle cx="35" cy="30" r="2.5" fill="cyan" />
    <circle cx="65" cy="70" r="2.5" fill="cyan" />
    <circle cx="35" cy="70" r="2.5" fill="#60a5fa" />
    <circle cx="65" cy="30" r="2.5" fill="#60a5fa" />
</svg>
