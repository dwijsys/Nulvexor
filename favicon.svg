<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc33;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a"/>
  
  <!-- Envelope body -->
  <rect x="25" y="30" width="50" height="35" rx="2" fill="none" stroke="url(#grad)" stroke-width="2"/>
  
  <!-- Envelope flap -->
  <path d="M25 30 L50 45 L75 30" fill="none" stroke="url(#grad)" stroke-width="2"/>
  
  <!-- N letter on envelope -->
  <path d="M42 35 L42 50 L45 50 L58 35 L58 50" fill="none" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Flame on envelope -->
  <path d="M50 38 Q48 42 48 45 Q48 48 50 50 Q52 48 52 45 Q52 42 50 38 Z" 
        fill="url(#grad)" opacity="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- Pulsing glow around flame -->
  <circle cx="50" cy="44" r="12" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0">
    <animate attributeName="r" values="12;18" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
