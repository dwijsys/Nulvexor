<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Solid background for visibility in browser tabs -->
    <circle cx="50" cy="50" r="48" fill="#000" />
    <style>
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; filter: blur(2px); }
            50% { opacity: 1; filter: blur(0px); }
        }
        .cipher-ring {
            transform-origin: center;
            animation: rotate 20s linear infinite;
        }
        .data-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: dash 3s cubic-bezier(0.4, 0, 0.2, 1) forwards infinite;
        }
        .center-n {
            animation: pulse-glow 3s ease-in-out infinite;
        }
    </style>

    <!-- Background Orbital Ring -->
    <circle cx="50" cy="50" r="45" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.3" class="cipher-ring" />
    <circle cx="50" cy="50" r="38" stroke="cyan" stroke-width="1" stroke-dasharray="10 5" opacity="0.5" />

    <!-- The 'N' Structure (Data Flow) -->
    <g class="center-n">
        <path d="M35 30V70" stroke="white" stroke-width="4" stroke-linecap="round" class="data-path" style="animation-delay: 0s;" />
        <path d="M35 30L65 70" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" class="data-path" style="animation-delay: 0.5s;" />
        <path d="M65 30V70" stroke="white" stroke-width="4" stroke-linecap="round" class="data-path" style="animation-delay: 1s;" />
    </g>

    <!-- Encryption Nodes -->
    <circle cx="35" cy="30" r="2" fill="cyan" />
    <circle cx="65" cy="70" r="2" fill="cyan" />
    <circle cx="35" cy="70" r="2" fill="#3b82f6" />
    <circle cx="65" cy="30" r="2" fill="#3b82f6" />
    
    <!-- Shifting Bits (Cipher Elements) -->
    <rect x="48" y="5" width="4" height="1" fill="white" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
    </rect>
    <rect x="48" y="94" width="4" height="1" fill="white" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="180 50 50" to="540 50 50" dur="10s" repeatCount="indefinite" />
    </rect>
</svg>
